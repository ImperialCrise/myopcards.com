services:
  game-server:
    build: ./game-server
    container_name: myopcards-game-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file: .env
    environment:
      DB_HOST: host.docker.internal
      BIND_ADDRESS: "0.0.0.0"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  myopcards-flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    container_name: myopcards-flaresolverr
    restart: unless-stopped
    ports:
      - "127.0.0.1:8192:8191"
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - TZ=UTC
    deploy:
      resources:
        limits:
          memory: 1g

  minio:
    image: minio/minio:latest
    container_name: myopcards-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
